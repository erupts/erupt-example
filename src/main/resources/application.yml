erupt-app:
  # 是否开启水印
  water-mark: false
  # 登录失败几次，需要验证码
  verify-code-count: 2
erupt:
  # 附件上传存储路径, 默认路径为：/opt/erupt-attachment
  upload-path: D:/erupt/attachment
  # 是否保留上传文件原始名称
  keep-upload-file-name: false
  upms:
    # 登录session时长（redisSession为true时有效）
    expire-time-by-login: 60
  default-locales: zh-CN

magic-api:
  web: /magic/web
  # 接口配置文件存放路径
  resource.location: D:/erupt/magic-script
  show-url: false

spring:
  datasource:
    url: jdbc:h2:file:./erupt;AUTO_SERVER=TRUE;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
  jpa:
    generate-ddl: true
    database: h2
    properties:
      hibernate:
        globally_quoted_identifiers: true
        type.enumeration.use_named: false
#  datasource:
#    url: jdbc:mysql://localhost:3306/erupt-example?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
#    username: root
#    password: 12345678
#  jpa:
#    show-sql: true
#    generate-ddl: true
#    database: mysql
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 10000

server:
  # 启用 gzip 压缩
  compression:
    mime-types: application/javascript,text/css,application/json,application/xml,text/html,text/xml,text/plain
    enabled: true
  error:
    includeException: true
    includeStacktrace: ALWAYS
    includeMessage: ALWAYS